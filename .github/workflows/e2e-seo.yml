name: E2E SEO Structural

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  schedule:
    # Daily at 06:00 UTC (03:00 BRT) — off-peak; detects SEO regressions from unrelated deploys
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'src/app/book/**'
      - 'src/app/layout.tsx'
      - 'src/app/sitemap.ts'
      - 'src/app/robots.ts'
      - 'tests/e2e/**'
      - 'playwright.config.ts'

concurrency:
  group: e2e-seo
  cancel-in-progress: true

jobs:
  e2e-seo:
    name: SEO Structural E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run SEO E2E spec
        run: npx playwright test --reporter=list,html
        env:
          E2E_BASE_URL: ${{ github.event.inputs.environment == 'staging' && 'https://staging.books.kosmyn.com' || 'https://books.kosmyn.com' }}
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-seo
          path: playwright-report/
          retention-days: 14
